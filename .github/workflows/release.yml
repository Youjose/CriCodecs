name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.0.1b0"
        required: true
        type: string
      publish_pypi:
        description: "Publish artifacts to PyPI after building"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: Validate release input
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate branch and tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          test "$GITHUB_REF_NAME" = "master"
          version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )"
          test "${TAG#v}" = "$version"

  sdist:
    name: Source distribution
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels-native:
    name: Wheels (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            archs: auto64
          - os: macos-26-intel
            archs: auto64
          - os: windows-2025-vs2026
            archs: auto64

    env:
      CIBW_ARCHS: ${{ matrix.archs }}
      CIBW_TEST_COMMAND: python -c "import cricodecs, cricodecs.adx; text = repr(cricodecs.adx.AdxEncodeConfig()); assert 'sample_rate=' in text; print(text)"
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2
        with:
          output-dir: wheelhouse

      - name: Audit macOS wheels
        if: runner.os == 'macOS'
        run: |
          python -m pip install delocate
          delocate-listdeps --all wheelhouse/*.whl

      - name: Audit Windows wheels
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install delvewheel
          Get-ChildItem wheelhouse/*.whl | ForEach-Object { delvewheel show $_.FullName }

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  cli-zip:
    name: CLI zip (${{ matrix.artifact_name }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            generator: Ninja
            platform: ""
            artifact_name: linux-x86_64
          - os: macos-26
            generator: Ninja
            platform: ""
            artifact_name: macos-arm64
          - os: macos-26-intel
            generator: Ninja
            platform: ""
            artifact_name: macos-x86_64
          - os: windows-2025-vs2026
            generator: Visual Studio 18 2026
            platform: "-A x64"
            artifact_name: windows-x86_64

    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install --upgrade pip cmake ninja

      - name: Configure CLI
        run: cmake -S . -B build -G "${{ matrix.generator }}" ${{ matrix.platform }} -DCMAKE_BUILD_TYPE=Release -DCRICODECS_BUILD_TESTS=OFF -DCRICODECS_BUILD_PYTHON=OFF -DCRICODECS_BUILD_CLI=ON

      - name: Build CLI
        run: cmake --build build --config Release --target cricodecs_cli --parallel

      - name: Install CLI
        run: cmake --install build --config Release --prefix stage

      - name: Smoke test CLI (Unix)
        if: runner.os != 'Windows'
        run: ./stage/cricodecs --help >/dev/null

      - name: Smoke test CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\stage\cricodecs.exe --help | Out-Null

      - name: Archive CLI zip
        run: cmake -E tar cf "cricodecs-cli-${{ matrix.artifact_name }}.zip" --format=zip stage

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.artifact_name }}
          path: cricodecs-cli-${{ matrix.artifact_name }}.zip

  release:
    name: GitHub release
    needs: [sdist, wheels-native, cli-zip]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check Python artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*.tar.gz dist/*.whl
          ls -lh dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
          gh release create "$TAG" dist/* --target "$GITHUB_SHA" --title "$TAG" --generate-notes

  publish-pypi:
    name: Publish to PyPI
    if: ${{ inputs.publish_pypi }}
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sdist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
