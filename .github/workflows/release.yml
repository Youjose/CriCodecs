name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.0.1b1"
        required: true
        type: string
      publish_pypi:
        description: "Publish artifacts to PyPI after building"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: Validate release input
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate branch and tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          test "$GITHUB_REF_NAME" = "master"
          version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )"
          test "${TAG#v}" = "$version"

  sdist:
    name: Source distribution
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels-native:
    name: Wheels (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            archs: auto64
          - os: macos-26-intel
            archs: auto64
          - os: windows-2025-vs2026
            archs: auto64

    env:
      CIBW_ARCHS: ${{ matrix.archs }}
      CIBW_TEST_COMMAND: python -c "import cricodecs, cricodecs.adx; text = repr(cricodecs.adx.AdxEncodeConfig()); assert 'sample_rate=' in text; print(text)"
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2
        with:
          output-dir: wheelhouse

      - name: Audit macOS wheels
        if: runner.os == 'macOS'
        run: |
          python -m pip install delocate
          delocate-listdeps --all wheelhouse/*.whl

      - name: Audit Windows wheels
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install delvewheel
          Get-ChildItem wheelhouse/*.whl | ForEach-Object { delvewheel show $_.FullName }

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  cli-zip:
    name: CLI zip (${{ matrix.artifact_name }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            generator: Ninja
            platform: ""
            artifact_name: macos-arm64
          - os: macos-26-intel
            generator: Ninja
            platform: ""
            artifact_name: macos-x86_64
          - os: windows-2025-vs2026
            generator: Visual Studio 18 2026
            platform: "-A x64"
            artifact_name: windows-x86_64

    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install --upgrade pip cmake ninja

      - name: Resolve release version
        id: release_version
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Configure CLI
        run: cmake -S . -B build -G "${{ matrix.generator }}" ${{ matrix.platform }} -DCMAKE_BUILD_TYPE=Release -DCRICODECS_VERSION=${{ steps.release_version.outputs.version }} -DCRICODECS_BUILD_TESTS=OFF -DCRICODECS_BUILD_PYTHON=OFF -DCRICODECS_BUILD_CLI=ON

      - name: Build CLI
        run: cmake --build build --config Release --target cricodecs_cli --parallel

      - name: Install CLI
        run: cmake --install build --config Release --prefix stage

      - name: Smoke test CLI (Unix)
        if: runner.os != 'Windows'
        run: ./stage/cricodecs --help >/dev/null

      - name: Smoke test CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\stage\cricodecs.exe --help | Out-Null

      - name: Archive CLI zip
        run: cmake -E chdir stage cmake -E tar cf "../cricodecs-${{ steps.release_version.outputs.version }}-cli-${{ matrix.artifact_name }}.zip" --format=zip .

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.artifact_name }}
          path: cricodecs-${{ steps.release_version.outputs.version }}-cli-${{ matrix.artifact_name }}.zip

  cli-zip-linux:
    name: CLI zip (linux-x86_64)
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: release_version
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build Linux CLI with GCC 16.1
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          docker run --rm \
            -e CC=gcc \
            -e CXX=g++ \
            -e CRICODECS_RELEASE_VERSION="${VERSION}" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            gcc:16.1 \
            bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends python3 python3-pip
              python3 -m pip install --break-system-packages cmake ninja
              c++ --version
              python3 -m cmake -S . -B build-cli-linux -G Ninja -DCMAKE_BUILD_TYPE=Release -DCRICODECS_VERSION="${CRICODECS_RELEASE_VERSION}" -DCRICODECS_BUILD_TESTS=OFF -DCRICODECS_BUILD_PYTHON=OFF -DCRICODECS_BUILD_CLI=ON
              python3 -m cmake --build build-cli-linux --target cricodecs_cli --parallel
              python3 -m cmake --install build-cli-linux --prefix stage-cli-linux
              ./stage-cli-linux/cricodecs --help >/dev/null
              python3 -m cmake -E chdir stage-cli-linux python3 -m cmake -E tar cf "../cricodecs-${CRICODECS_RELEASE_VERSION}-cli-linux-x86_64.zip" --format=zip .
            '

      - uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x86_64
          path: cricodecs-${{ steps.release_version.outputs.version }}-cli-linux-x86_64.zip

  release:
    name: GitHub release
    needs: [sdist, wheels-native, cli-zip, cli-zip-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check Python artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*.tar.gz dist/*.whl
          ls -lh dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
          gh release create "$TAG" dist/* --target "$GITHUB_SHA" --title "$TAG" --generate-notes

  publish-pypi:
    name: Publish to PyPI
    if: ${{ inputs.publish_pypi }}
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sdist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
