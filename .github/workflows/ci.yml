name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist
        run: python -m build --sdist

      - name: Check package metadata
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  cli-zip:
    name: CLI zip (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            generator: Ninja
            platform: ""
            artifact_name: macos-arm64
          - os: macos-26-intel
            generator: Ninja
            platform: ""
            artifact_name: macos-x86_64
          - os: windows-2025-vs2026
            generator: Visual Studio 18 2026
            platform: "-A x64"
            artifact_name: windows-x86_64

    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install --upgrade pip cmake ninja

      - name: Configure CLI
        run: cmake -S . -B build -G "${{ matrix.generator }}" ${{ matrix.platform }} -DCMAKE_BUILD_TYPE=Release -DCRICODECS_BUILD_TESTS=OFF -DCRICODECS_BUILD_PYTHON=OFF -DCRICODECS_BUILD_CLI=ON

      - name: Build CLI
        run: cmake --build build --config Release --target cricodecs_cli --parallel

      - name: Install CLI
        run: cmake --install build --config Release --prefix stage

      - name: Smoke test CLI (Unix)
        if: runner.os != 'Windows'
        run: ./stage/cricodecs --help >/dev/null

      - name: Smoke test CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\stage\cricodecs.exe --help | Out-Null

      - name: Archive CLI zip
        run: cmake -E chdir stage cmake -E tar cf "../cricodecs-cli-${{ matrix.artifact_name }}.zip" --format=zip .

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.artifact_name }}
          path: cricodecs-cli-${{ matrix.artifact_name }}.zip

  cli-zip-linux:
    name: CLI zip (linux-x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Linux CLI with GCC 16.1
        run: |
          docker run --rm \
            -e CC=gcc \
            -e CXX=g++ \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            gcc:16.1 \
            bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends python3 python3-pip
              python3 -m pip install --break-system-packages cmake ninja
              c++ --version
              python3 -m cmake -S . -B build-cli-linux -G Ninja -DCMAKE_BUILD_TYPE=Release -DCRICODECS_BUILD_TESTS=OFF -DCRICODECS_BUILD_PYTHON=OFF -DCRICODECS_BUILD_CLI=ON
              python3 -m cmake --build build-cli-linux --target cricodecs_cli --parallel
              python3 -m cmake --install build-cli-linux --prefix stage-cli-linux
              ./stage-cli-linux/cricodecs --help >/dev/null
              python3 -m cmake -E chdir stage-cli-linux python3 -m cmake -E tar cf ../cricodecs-cli-linux-x86_64.zip --format=zip .
            '

      - uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x86_64
          path: cricodecs-cli-linux-x86_64.zip

  source-build:
    name: Source build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            generator: Ninja
            platform: ""
          - os: macos-26-intel
            generator: Ninja
            platform: ""
          - os: windows-2025-vs2026
            generator: Visual Studio 18 2026
            platform: "-A x64"

    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install --upgrade pip cmake ninja

      - name: Show toolchain
        run: cmake --version

      - name: Configure core library
        run: cmake -S . -B build -G "${{ matrix.generator }}" ${{ matrix.platform }} -DCMAKE_BUILD_TYPE=Release -DCRICODECS_BUILD_TESTS=OFF -DCRICODECS_BUILD_PYTHON=OFF

      - name: Build core library
        run: cmake --build build --config Release --parallel

  gcc16-source-build:
    name: Source build (GCC 16.1)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build core library with GCC 16.1
        run: |
          docker run --rm \
            -e CC=gcc \
            -e CXX=g++ \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            gcc:16.1 \
            bash -lc "apt-get update && apt-get install -y --no-install-recommends python3 python3-pip && python3 -m pip install --break-system-packages cmake ninja && c++ --version && python3 -m cmake -S . -B build-gcc16 -G Ninja -DCMAKE_BUILD_TYPE=Release -DCRICODECS_BUILD_TESTS=OFF -DCRICODECS_BUILD_PYTHON=OFF && python3 -m cmake --build build-gcc16 --parallel"

  pip-install:
    name: Pip install (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, macos-26-intel, windows-2025-vs2026]
        python-version: ["3.9", "3.14"]

    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install from source tree
        run: python -m pip install --verbose .

      - name: Import smoke
        run: python -c "import cricodecs, cricodecs.adx; text = repr(cricodecs.adx.AdxEncodeConfig()); assert 'sample_rate=' in text; print(text)"

      - name: CLI entry-point smoke
        run: cricodecs --help

  pip-install-linux:
    name: Pip install (linux-x86_64, GCC 16.1)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install package with GCC 16.1
        run: |
          docker run --rm \
            -e CC=gcc \
            -e CXX=g++ \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            gcc:16.1 \
            bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends python3 python3-venv
              python3 -m venv /tmp/cricodecs-venv
              . /tmp/cricodecs-venv/bin/activate
              python -m pip install --upgrade pip
              c++ --version
              python -m pip install --verbose .
              python -c "import cricodecs, cricodecs.adx; text = repr(cricodecs.adx.AdxEncodeConfig()); assert '\''sample_rate='\'' in text; print(text)"
              cricodecs --help
            '
